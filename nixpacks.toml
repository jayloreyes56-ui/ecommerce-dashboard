[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs-20_x"]

[phases.install]
cmds = [
  "composer install --working-dir=backend --no-dev --optimize-autoloader",
  "npm ci --prefix frontend"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend",
  "mkdir -p backend/database",
  "touch backend/database/database.sqlite"
]

[start]
cmd = "cd backend && php artisan migrate --force --seed && php artisan serve --host=0.0.0.0 --port=$PORT"
